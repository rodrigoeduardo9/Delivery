name: client_app
description: Customer-facing food delivery mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  google_maps_flutter: ^2.5.0
  flutter_polyline_points: ^2.0.0
  firebase_messaging: ^14.7.10
  firebase_core: ^2.24.2
  local_auth: ^2.1.7
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  url_launcher: ^6.2.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.0.4
  web_socket_channel: ^2.4.0
  flutter_local_notifications: ^16.3.2
  another_flushbar: ^1.12.30
  badges: ^3.1.2
  dotted_border: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
